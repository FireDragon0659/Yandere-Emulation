                    c = ["你怎么能不管我！", "你怎么能抛弃我！", "你是不是不爱我了！", "你是不是有别人了！", "我还是你亲爱的吗？", "你为什么要这么对我！", `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M12 19q-3.775 0-6.738-2.087T1 11.5q1.3-3.325 4.263-5.413T12 4t6.738 2.088T23 11.5q-1.3 3.325-4.262 5.413T12 19m-7.925 1.7q-.95-.65-1.7-1.463t-1.25-1.762l1.75-.95q.4.725 1.013 1.375t1.387 1.175zM12 17q2.875 0 5.225-1.475t3.6-4.025q-1.25-2.55-3.6-4.025T12 6T6.775 7.475t-3.6 4.025q1.25 2.55 3.6 4.025T12 17m-6.15 4.675L7.05 20q.9.375 1.9.625t2.05.325v2q-1.4-.1-2.687-.425t-2.463-.85M12 16q1.875 0 3.188-1.312T16.5 11.5t-1.312-3.187T12 7T8.813 8.313T7.5 11.5t1.313 3.188T12 16m0-1.8q-1.125 0-1.912-.788T9.3 11.5t.788-1.912T12 8.8t1.913.788t.787 1.912t-.787 1.913T12 14.2m1 8.75v-2q1.05-.075 2.05-.325t1.9-.625l1.2 1.675q-.875.45-2.3.813T13 22.95m6.925-2.25l-1.2-1.65q.775-.525 1.388-1.162t1.012-1.363l1.75.95q-.5.95-1.25 1.763t-1.7 1.462M12 11.5"/></svg>`]
                    co = "你可真是一个心地善良的好人(❁´◡`❁)"
                } else if (selects[14] >= 3) {
                    c = ["你真的好变态！", "我好喜欢你~", "你不应该抛弃我！", "我已经爱上你了！", "你怎么能这样！", `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M12 19q-3.775 0-6.738-2.087T1 11.5q1.3-3.325 4.263-5.413T12 4t6.738 2.088T23 11.5q-1.3 3.325-4.262 5.413T12 19m-7.925 1.7q-.95-.65-1.7-1.463t-1.25-1.762l1.75-.95q.4.725 1.013 1.375t1.387 1.175zM12 17q2.875 0 5.225-1.475t3.6-4.025q-1.25-2.55-3.6-4.025T12 6T6.775 7.475t-3.6 4.025q1.25 2.55 3.6 4.025T12 17m-6.15 4.675L7.05 20q.9.375 1.9.625t2.05.325v2q-1.4-.1-2.687-.425t-2.463-.85M12 16q1.875 0 3.188-1.312T16.5 11.5t-1.312-3.187T12 7T8.813 8.313T7.5 11.5t1.313 3.188T12 16m0-1.8q-1.125 0-1.912-.788T9.3 11.5t.788-1.912T12 8.8t1.913.788t.787 1.912t-.787 1.913T12 14.2m1 8.75v-2q1.05-.075 2.05-.325t1.9-.625l1.2 1.675q-.875.45-2.3.813T13 22.95m6.925-2.25l-1.2-1.65q.775-.525 1.388-1.162t1.012-1.363l1.75.95q-.5.95-1.25 1.763t-1.7 1.462M12 11.5"/></svg>`]
                    co = "我感觉我已经堕入爱河了(❁´◡`❁)"
                }
                for (let i = 0; i < 100; i++) {
                    const div = document.createElement("div")
                    div.style.position = "absolute"
                    div.style.top = `${Math.random() * 96}vh`
                    div.style.left = `${Math.random() * 90 + 2}vw`
                    div.style.fontSize = `${Math.random() * 5 + 8}px`
                    div.style.color = "red"
                    div.style.fontWeight = Math.random() < 0.3 ? "bold" : "normal"
                    div.innerHTML = c[Math.floor(Math.random() * c.length)]
                    root.appendChild(div)
                    await sleep(100 - i)
                }
                const div = document.createElement("div");
                div.style.color = "red";
                div.style.fontSize = "30px"
                root.appendChild(div);
                const text = co
                for (let i = 0; i < text.length; i++) {
                    div.innerText += text[i]
                    await sleep(300)
                }
                await sleep(1000)
            } else if (currentSelect === 20) {
                const div = document.createElement("div");
                root.appendChild(div);
                div.style.scale = "2"
                div.style.color = "red"
                div.style.fontSize = "20px"
                div.style.animation = "jump 2s"
                div.innerHTML = '我的头好痛啊！'
                await sleep(3000)
            }
        }
        function openMessage() {
            root.innerHTML = ""
            const totalScore = dialog
                .map((idx, i) => dialog[i].answer[selects[i]].score)
                .reduce((sum, score) => sum + score, 0);
            const wild = document.createElement("div")
            wild.classList.add("wild-div")
            const ask = document.createElement("div")
            ask.style.color = "red"
            ask.innerHTML = "你的病娇指数是："
            wild.appendChild(ask);
            const scoreArea = document.createElement("div")
            scoreArea.style.fontSize = "30px"
            scoreArea.style.fontWeight = "bold"
            scoreArea.style.color = "red"
            scoreArea.innerHTML = `${totalScore}`
            wild.appendChild(scoreArea);
            const comment = document.createElement("div")
            comment.style.width = "90%"
            comment.innerHTML = `
                <div style="color: red; text-indent: 2em;">${(function () {
                    let report = ""
                    if (totalScore <= 30) {
                        report = "你害怕黑暗和怪谈，内心干净。病娇指数：★☆☆☆☆\n建议：快逃，这个测试不适合你。";
                    } else if (totalScore <= 50) {
                        report = "你有轻微偏执，偶尔幻想恐怖场景，但理智尚存。病娇指数：★★☆☆☆\n建议：别玩灵异游戏，别收集奇怪的东西。";
                    } else if (totalScore <= 75) {
                        report = "你的内心住着一个细思极恐的存在。你可能已经在收集恋人的头发，或在午夜点过蜡烛。病娇指数：★★★☆☆\n警告：衣柜里的声音可能会越来越清晰。";
                    } else if (totalScore <= 90) {
                        report = "你离完全病娇化只差一个仪式。地下室、标本、诅咒……对你来说只是时间问题。病娇指数：★★★★☆\n警告：你的恋人如果还没逃，建议他去看心理医生。";
                    } else {
                        report = "你已经不是人类。镜子里的你在微笑，梳子里缠着别人的头发，锁链声是你入睡的白噪音。病娇指数：★★★★★\n结局：你终于完成了永远不会离开的“恋人”。恭喜？";
                    }
                    return report
                })()
                }</div>
            `
            wild.appendChild(comment);
            root.appendChild(wild)
        }
        async function done() {
            const div = document.createElement("div");
            root.appendChild(div);
            div.style.scale = "20"
            div.style.color = "red"
            div.style.animation = "scare 2s"
            div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M12 9c1.211 0 2.381.355 3.297 1.004c1.301.92 2.43 2.124 3.165 2.996c-.735.872-1.864 2.077-3.166 2.996C14.381 16.645 13.211 17 12 17s-2.382-.355-3.299-1.004C7.4 15.076 6.271 13.872 5.537 13c.734-.872 1.863-2.076 3.164-2.995C9.618 9.355 10.789 9 12 9m0-2c-1.691 0-3.242.516-4.453 1.371C4.928 10.223 3 13 3 13s1.928 2.777 4.547 4.629C8.758 18.484 10.309 19 12 19s3.242-.516 4.451-1.371C19.07 15.777 21 13 21 13s-1.93-2.777-4.549-4.629C15.242 7.516 13.691 7 12 7m0 5a1 1 0 1 0-.002 1.998A1 1 0 0 0 12 12m0 4c-1.654 0-3-1.346-3-3s1.346-3 3-3s3 1.346 3 3s-1.346 3-3 3m0-5a2 2 0 1 0 .001 4.001A2 2 0 0 0 12 11"/></svg>`
            await sleep(2000)
            div.style.animation = "shake 0.2s infinite"
            await sleep(2000)
            root.innerHTML = ""
            const wild = document.createElement("div")
            wild.classList.add("wild-div")
            const ask = document.createElement("div")
            ask.classList.add("ask-area")
            ask.innerHTML = `你有一封检测报告，是否打开？`
            const next = document.createElement("div")
            next.classList.add("next-area")
            next.innerHTML = `
                <button class="normal-button" onclick="openMessage()">打开</button>
            `
            root.appendChild(wild)
            wild.appendChild(ask)
            wild.appendChild(next)
        }
        async function doing(c) {
            if (selects[currentSelect] < 0 && c > 0) {
                return
            }
            root.innerHTML = ""
            currentSelect += c
            await doStyle();
            root.innerHTML = ""
            if (currentSelect >= dialog.length) {
                await done()
                return
            }
            const wild = document.createElement("div")
            wild.classList.add("wild-div")
            const ask = document.createElement("div")
            ask.classList.add("ask-area")
            ask.innerHTML = `问：<br>${dialog[currentSelect].question}<br><span style="font-size: 8px">第 ${currentSelect + 1} 题 / 共 ${dialog.length} 题</span>`
            ans = document.createElement("div")
            ans.classList.add("ans-area")
            const next = document.createElement("div")
            next.classList.add("next-area")
            next.innerHTML = `
                    ${currentSelect === 0 ? '<div></div>' : '<button class="normal-button" onclick="doing(-1)">上一题</button>'}
                    <button class="normal-button" onclick="doing(1)">${currentSelect === dialog.length - 1 ? '提交' : '下一题'}</button>
                `
            root.appendChild(wild)
            wild.appendChild(ask)
            wild.appendChild(ans)
            wild.appendChild(next)
            buttons = []
            for (let i = 0; i < dialog[currentSelect].answer.length; i++) {
                showButton(currentSelect, i)
            }
        }
        async function start() {
            root.innerHTML = "";
            const div = document.createElement("div");
            div.style.color = "red";
            root.appendChild(div);
            const text = "我会一直盯着你的！"
            for (let i = 0; i < text.length; i++) {
                div.innerText += text[i]
                await sleep(300)
            }
            await sleep(1000)
            await doing(0)
        }
        window.addEventListener("DOMContentLoaded", () => {
            root.innerHTML = `
                    <div class="wild-div">
                        <div style="color: red; font-size: 18px">心理测试</div>
                        <div style="color: red; font-size: 10px; text-align: center;">如果你有心脏病，或者是在游玩过程中感到不适，请立刻停止答题！</div>
                        <div style="color: red; font-size: 10px; text-align: center;">共计 25 道题，从 100 题的题库里面随机抽取，选项也随机。</div>
                        <button class="normal-button" onclick="start()">开始</button> 
                    </div>
                `
        })
    </script>
</body>

</html>
